version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: cve-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  web-ui:
    build: .
    container_name: cve-web-ui
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    command: python app.py
    depends_on:
      - elasticsearch
    volumes:
      - .:/app
volumes:
  es_data: