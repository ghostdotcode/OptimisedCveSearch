<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE Data Lake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1
                class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
                CVE Intelligence Dashboard
            </h1>
            <div class="flex justify-center gap-4 max-w-2xl mx-auto">
                <input type="text" id="searchInput" placeholder="Enter CVE ID (e.g., CVE-2024-3094)..."
                    class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-900 outline-none transition-all text-lg shadow-inner">
                <button onclick="searchCve()"
                    class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors shadow-lg shadow-blue-900/20">
                    Search
                </button>
            </div>
            <p id="errorMsg" class="text-red-400 mt-4 hidden font-medium"></p>
        </header>

        <div
            class="flex flex-col sm:flex-row justify-between items-center bg-gray-900 border border-gray-800 rounded-lg p-4 mb-4 shadow-md">
            <div class="flex items-center gap-3 mb-4 sm:mb-0">
                <div class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </div>
                <span class="text-sm font-medium text-gray-400 uppercase tracking-wider">Next Auto-Sync In:</span>
                <span id="countdownClock" class="font-mono text-xl font-bold text-emerald-400">--:--</span>
            </div>
            <button onclick="forceSync()" id="forceSyncBtn"
                class="px-5 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                Force Sync Now
            </button>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-8 shadow-md">
            <div class="flex flex-col sm:flex-row justify-between items-center">
                <div>
                    <h3 class="text-lg font-bold text-white mb-1">Database Reconstruction</h3>
                    <p class="text-sm text-gray-400">Trigger a full distributed backfill of all historical records via
                        Celery worker.</p>
                </div>
                <button id="backfill-btn"
                    class="mt-4 sm:mt-0 px-5 py-2 bg-amber-600 hover:bg-amber-500 text-white font-semibold rounded-md transition-colors shadow-lg shadow-amber-900/20">
                    Run Full Backfill
                </button>
            </div>
            <div id="backfill-status" class="mt-4 w-full"></div>
        </div>

        <div id="toggleContainer" class="hidden flex justify-end mb-4">
            <button onclick="toggleView()" id="toggleBtn"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                </svg>
                Switch to JSON View
            </button>
        </div>

        <main id="resultsArea" class="hidden">
            <div id="tableView" class="pop-in bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-gray-800 bg-gray-900/50">
                    <h2 class="text-2xl font-bold text-white" id="tv-cveId">CVE-XXXX-XXXX</h2>
                    <div class="mt-2 flex items-center gap-2 flex-wrap">
                        <span
                            class="px-3 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"
                            id="tv-state">PUBLISHED</span>
                        <div id="tv-cvss-badge" class="hidden"></div>
                    </div>
                </div>

                <div class="p-6">
                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Description</h3>
                        <p class="text-gray-300 text-lg leading-relaxed" id="tv-description"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-800">
                        <div>
                            <p class="text-sm font-medium text-gray-500">Assigner Org ID</p>
                            <p class="font-mono text-gray-300 mt-1" id="tv-assignerOrgId"></p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Assigner Short Name</p>
                            <p class="font-mono text-gray-300 mt-1" id="tv-assignerShortName"></p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Date Published</p>
                            <p class="font-mono text-gray-300 mt-1" id="tv-datePublished"></p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Date Reserved</p>
                            <p class="font-mono text-gray-300 mt-1" id="tv-dateReserved"></p>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Date Updated</p>
                            <p class="font-mono text-gray-300 mt-1" id="tv-dateUpdated"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="jsonView" class="hidden pop-in">
                <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
                    <div class="p-4 border-b border-gray-800 bg-gray-800/50 flex justify-between items-center">
                        <span class="font-mono text-sm text-gray-400">raw_data.json</span>
                    </div>
                    <pre
                        class="p-6 overflow-x-auto max-h-[70vh] text-sm font-mono text-emerald-400 leading-relaxed bg-[#0d1117]"><code id="jsonContent"></code></pre>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- REDIS-BACKED POLLING LOGIC ---
        function pollBackfillStatus() {
            fetch('/api/backfill/status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('backfill-status');

                    if (data.running) {
                        // let total = data.total_found || 1;
                        let total = 333000;
                        let processed = data.indexed + data.skipped + data.failed;
                        let percent = Math.round((processed / total) * 100);

                        statusDiv.innerHTML = `
                            <div class="p-4 border rounded-md bg-blue-900/20 border-blue-800/50">
                                <div class="flex justify-between mb-1">
                                    <span class="text-sm font-medium text-blue-400">Sync in progress...</span>
                                    <span class="text-sm font-medium text-blue-400">${percent}%</span>
                                </div>
                                <div class="w-full bg-gray-800 rounded-full h-2 mb-2">
                                    <div class="bg-blue-500 h-2 rounded-full" style="width: ${percent}%"></div>
                                </div>
                                <div class="text-xs text-gray-400 font-mono">
                                    Indexed: <span class="text-emerald-400">${data.indexed}</span> | 
                                    Skipped: <span class="text-gray-500">${data.skipped}</span> | 
                                    Failed: <span class="text-red-400">${data.failed}</span>
                                </div>
                            </div>
                        `;
                        setTimeout(pollBackfillStatus, 2000);
                    } else if (data.done) {
                        statusDiv.innerHTML = `
                            <div class="p-4 border rounded-md bg-emerald-900/20 border-emerald-800/50">
                                <span class="text-sm font-medium text-emerald-400">Sync Complete! Successfully processed ${data.total_found} files.</span>
                            </div>
                        `;
                    } else {
                        statusDiv.innerHTML = ``;
                    }
                })
                .catch(err => console.error("Error polling status:", err));
        }

        document.getElementById('backfill-btn').addEventListener('click', function () {
            document.getElementById('backfill-status').innerHTML = `
                <div class="p-4 border rounded-md bg-amber-900/20 border-amber-800/50">
                    <span class="text-sm font-medium text-amber-400 animate-pulse">Initializing distributed Celery task...</span>
                </div>
            `;
            fetch('/api/backfill', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    setTimeout(pollBackfillStatus, 1000);
                });
        });

        window.addEventListener('DOMContentLoaded', pollBackfillStatus);

        // --- EXISTING LOGIC ---
        let syncCountdown = 0;

        async function fetchSyncStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                syncCountdown = data.seconds_remaining;
                updateClockUI();
            } catch (err) {
                document.getElementById('countdownClock').textContent = "ERROR";
            }
        }

        function updateClockUI() {
            if (syncCountdown < 0) syncCountdown = 0;
            const minutes = Math.floor(syncCountdown / 60).toString().padStart(2, '0');
            const seconds = (syncCountdown % 60).toString().padStart(2, '0');
            document.getElementById('countdownClock').textContent = `${minutes}:${seconds}`;
        }

        setInterval(() => {
            if (syncCountdown > 0) {
                syncCountdown--;
                updateClockUI();
            } else if (syncCountdown === 0) {
                fetchSyncStatus();
            }
        }, 1000);

        async function forceSync() {
            const btn = document.getElementById('forceSyncBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Syncing...`;
            btn.disabled = true;

            try {
                await fetch('/api/force_sync', { method: 'POST' });
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 3000);
            } catch (err) {
                console.error(err);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        fetchSyncStatus();
        let currentView = 'table';

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchCve();
        });

        async function searchCve() {
            const cveId = document.getElementById('searchInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const resultsArea = document.getElementById('resultsArea');
            const toggleContainer = document.getElementById('toggleContainer');
            const tableView = document.getElementById('tableView');
            const jsonView = document.getElementById('jsonView');
            const cvssBadgeContainer = document.getElementById('tv-cvss-badge');

            if (!cveId) return;

            errorMsg.classList.add('hidden');
            resultsArea.classList.add('hidden');
            toggleContainer.classList.add('hidden');

            tableView.classList.remove('pop-in');
            jsonView.classList.remove('pop-in');

            try {
                const response = await fetch(`/api/search?cve_id=${encodeURIComponent(cveId)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch CVE data');
                }

                document.getElementById('tv-cveId').textContent = data.table_data.cveId;
                document.getElementById('tv-state').textContent = data.table_data.state;
                document.getElementById('tv-description').textContent = data.table_data.description;
                document.getElementById('tv-assignerOrgId').textContent = data.table_data.assignerOrgId;
                document.getElementById('tv-assignerShortName').textContent = data.table_data.assignerShortName;
                document.getElementById('tv-datePublished').textContent = data.table_data.datePublished;
                document.getElementById('tv-dateReserved').textContent = data.table_data.dateReserved;
                document.getElementById('tv-dateUpdated').textContent = data.table_data.dateUpdated;

                const severity = data.table_data.cvssSeverity;
                const score = data.table_data.cvssScore;
                const version = data.table_data.cvssVersion;

                if (score && score !== "N/A") {
                    let badgeColor = "bg-gray-500/10 text-gray-400 border-gray-500/20";
                    if (severity === "CRITICAL") badgeColor = "bg-red-500/10 text-red-400 border-red-500/20";
                    else if (severity === "HIGH") badgeColor = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                    else if (severity === "MEDIUM") badgeColor = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                    else if (severity === "LOW") badgeColor = "bg-green-500/10 text-green-400 border-green-500/20";

                    cvssBadgeContainer.innerHTML = `<span class="px-3 py-1 rounded-full text-xs font-bold border ${badgeColor}">CVSS: ${score} (${severity}) - ${version}</span>`;
                } else {
                    cvssBadgeContainer.innerHTML = `
                        <span class="px-3 py-1 rounded-full text-xs font-bold border bg-gray-800 text-gray-400 border-gray-700 animate-pulse flex items-center gap-2">
                            <svg class="animate-spin w-3 h-3 text-blue-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Querying NVD...
                        </span>`;

                    fetch(`/api/nvd_cvss?cve_id=${encodeURIComponent(cveId)}`)
                        .then(nvdResponse => nvdResponse.json())
                        .then(nvdData => {
                            if (nvdData.score && nvdData.score !== "N/A") {
                                let badgeColor = "bg-gray-500/10 text-gray-400 border-gray-500/20";
                                if (nvdData.severity === "CRITICAL") badgeColor = "bg-red-500/10 text-red-400 border-red-500/20";
                                else if (nvdData.severity === "HIGH") badgeColor = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                                else if (nvdData.severity === "MEDIUM") badgeColor = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                                else if (nvdData.severity === "LOW") badgeColor = "bg-green-500/10 text-green-400 border-green-500/20";

                                cvssBadgeContainer.innerHTML = `<span class="px-3 py-1 rounded-full text-xs font-bold border ${badgeColor}">NVD CVSS: ${nvdData.score} (${nvdData.severity}) - ${nvdData.version}</span>`;
                            } else {
                                cvssBadgeContainer.innerHTML = `<span class="px-3 py-1 rounded-full text-xs font-bold border bg-gray-500/10 text-gray-500 border-gray-500/20">No CVSS Score Published</span>`;
                            }
                        })
                        .catch(() => {
                            cvssBadgeContainer.innerHTML = `<span class="px-3 py-1 rounded-full text-xs font-bold border bg-red-900/20 text-red-500 border-red-900/50">NVD Timeout</span>`;
                        });
                }
                cvssBadgeContainer.classList.remove('hidden');
                document.getElementById('jsonContent').textContent = data.full_json;

                resultsArea.classList.remove('hidden');
                toggleContainer.classList.remove('hidden');

                void tableView.offsetWidth;
                tableView.classList.add('pop-in');
                jsonView.classList.add('pop-in');

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            }
        }

        function toggleView() {
            const tableView = document.getElementById('tableView');
            const jsonView = document.getElementById('jsonView');
            const toggleBtn = document.getElementById('toggleBtn');

            if (currentView === 'table') {
                tableView.classList.add('hidden');
                jsonView.classList.remove('hidden');
                toggleBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Switch to Table View`;
                currentView = 'json';
            } else {
                jsonView.classList.add('hidden');
                tableView.classList.remove('hidden');
                toggleBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg> Switch to JSON View`;
                currentView = 'table';
            }
        }
    </script>
</body>

</html>
